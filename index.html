<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daikin AC Market Mapping</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f7fb; margin:0; padding:0; }
    .container { max-width: 1000px; margin: 20px auto; background:#fff; padding:20px; border-radius:14px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    h1,h2 { color:#014b52; margin-top:0; }
    .grid { display:grid; grid-template-columns: repeat(2,1fr); gap:14px; }
    .grid3 { display:grid; grid-template-columns: repeat(3,1fr); gap:14px; }
    label { display:block; font-size:14px; font-weight:700; margin-bottom:6px; }
    input, select, textarea, button { width:100%; padding:12px; border:1px solid #cdd5df; border-radius:10px; box-sizing:border-box; font-size:14px; }
    textarea { min-height:80px; resize:vertical; }
    .section { border:1px solid #e6ebf1; border-radius:12px; padding:16px; margin-bottom:18px; }
    .muted { color:#667085; font-size:12px; }
    .readonly { background:#f1f5f9; }
    .msg { display:none; padding:12px; border-radius:10px; margin-bottom:14px; }
    .success { display:block; background:#e8f7ee; color:#126a36; }
    .error { display:block; background:#fdecef; color:#a42843; }
    .btn { background:#01696f; color:#fff; font-weight:700; border:none; cursor:pointer; }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    @media (max-width:768px){ .grid,.grid3{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="container">
  <h1>Daikin AC Market Mapping</h1>
  <div id="msg" class="msg"></div>

  <div class="section">
    <h2>Location Mapping</h2>
    <div class="grid">
      <div><label>State</label><select id="state"><option value="">Select State</option></select></div>
      <div><label>District</label><select id="district"><option value="">Select District</option></select></div>
      <div><label>Search Pincode</label><input id="pincodeSearch" placeholder="Type pincode" /></div>
      <div><label>Pincode</label><select id="pincode"><option value="">Select Pincode</option></select></div>
      <div style="grid-column:1/-1"><label>Office Name</label><select id="officeName"><option value="">Select Office Name</option></select></div>
    </div>
  </div>

  <div class="section">
    <h2>Dealer Selection</h2>
    <label>Dealer List as per Pincode</label>
    <select id="dealerSelect"><option value="">Select Dealer</option></select>
    <div class="muted">For existing dealer, only Dealer Name and Dealer Address auto-fill. For Add New Dealer, all dealer fields stay editable.</div>
  </div>

  <div class="section">
    <h2>Dealer Information</h2>
    <div class="grid">
      <div><label>Dealer Name</label><input type="text" id="dealerName" placeholder="Dealer Name" /></div>
      <div><label>Owner Name</label><input type="text" id="ownerName" placeholder="Owner Name" /></div>
      <div><label>Contact Number</label><input type="text" id="mobileNumber" placeholder="Contact Number" maxlength="10" /></div>
      <div><label>Dealer Category</label><select id="dealerCategory"><option value="">Select Category</option><option>ED</option><option>AC</option><option>HA</option><option>NR</option><option>RR</option><option>GT</option><option>DSP</option><option>DND</option><option>SSD</option></select></div>
      <div style="grid-column:1/-1"><label>Dealer Address</label><textarea id="dealerAddress" placeholder="Dealer Address"></textarea></div>
    </div>
  </div>

  <div class="section">
    <h2>Counter & Brand Mapping</h2>
    <div class="grid3">
      <div><label>Total AC Counter Size</label><input type="number" id="totalCounterSize" min="0" /></div>
      <div><label>Daikin Association</label><select id="daikinAssociation"><option value="">Select</option><option>Y</option><option>N</option></select></div>
      <div><label>Brand Total</label><input type="number" id="brandTotal" readonly class="readonly" /></div>
      <div><label>Daikin</label><input type="number" id="daikin" min="0" value="0" /></div>
      <div><label>Voltas</label><input type="number" id="voltas" min="0" value="0" /></div>
      <div><label>LG</label><input type="number" id="lg" min="0" value="0" /></div>
      <div><label>Panasonic</label><input type="number" id="panasonic" min="0" value="0" /></div>
      <div><label>Samsung</label><input type="number" id="samsung" min="0" value="0" /></div>
      <div><label>Hitachi</label><input type="number" id="hitachi" min="0" value="0" /></div>
      <div><label>Bluestar</label><input type="number" id="bluestar" min="0" value="0" /></div>
      <div><label>Carrier Toshiba</label><input type="number" id="carrierToshiba" min="0" value="0" /></div>
      <div><label>Midea</label><input type="number" id="midea" min="0" value="0" /></div>
      <div><label>MH</label><input type="number" id="mh" min="0" value="0" /></div>
      <div><label>ME</label><input type="number" id="me" min="0" value="0" /></div>
      <div><label>Godrej</label><input type="number" id="godrej" min="0" value="0" /></div>
      <div><label>LLYOD</label><input type="number" id="llyod" min="0" value="0" /></div>
      <div><label>Others Manual</label><input type="number" id="othersManual" min="0" value="0" /></div>
      <div><label>Others Final</label><input type="number" id="othersCalculated" readonly class="readonly" /></div>
    </div>
  </div>

  <button class="btn" id="submitBtn" onclick="submitFinal()">Submit Mapping</button>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyJXCcDiVuIZQbYy8QTOOWC7y3L5XQ58LHWz_WEP5uRrArXGCS9IpngjQoXq4QGzuZy/exec';
let locationMaster = [];
let dealerMaster = [];
const brandIds = ['daikin','voltas','lg','panasonic','samsung','hitachi','bluestar','carrierToshiba','midea','mh','me','godrej','llyod','othersManual'];

function showMsg(text, type='success') {
  const el = document.getElementById('msg');
  el.className = 'msg ' + (type === 'error' ? 'error' : 'success');
  el.textContent = text;
}
function uniq(arr) { return [...new Set(arr.filter(Boolean))].sort(); }

function jsonpRequest(action) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + action + '_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    window[cb] = function(data) {
      resolve(data);
      cleanup();
    };
    function cleanup() {
      try { delete window[cb]; } catch(e) {}
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    const script = document.createElement('script');
    script.src = APPS_SCRIPT_URL + '?action=' + encodeURIComponent(action) + '&callback=' + cb;
    script.onerror = function() {
      cleanup();
      reject(new Error('Failed to load ' + action));
    };
    document.body.appendChild(script);
    setTimeout(() => {
      if (window[cb]) {
        cleanup();
        reject(new Error('Request timeout for ' + action));
      }
    }, 15000);
  });
}

async function loadMasters() {
  try {
    const [locJson, dealerJson] = await Promise.all([
      jsonpRequest('getLocationMaster'),
      jsonpRequest('getDealerMaster')
    ]);
    if (!locJson.success || !dealerJson.success) throw new Error('Master data load failed');
    locationMaster = locJson.data || [];
    dealerMaster = dealerJson.data || [];
    loadStates();
    showMsg('Master data loaded successfully.');
  } catch (err) {
    showMsg('Unable to load master data: ' + err.message, 'error');
  }
}

function loadStates() { const stateEl = document.getElementById('state'); stateEl.innerHTML = '<option value="">Select State</option>'; uniq(locationMaster.map(x => x.statename)).forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; stateEl.appendChild(o); }); }
function onStateChange() { const state = document.getElementById('state').value; const districtEl = document.getElementById('district'); districtEl.innerHTML = '<option value="">Select District</option>'; document.getElementById('pincode').innerHTML = '<option value="">Select Pincode</option>'; document.getElementById('officeName').innerHTML = '<option value="">Select Office Name</option>'; resetDealerSection(); uniq(locationMaster.filter(x => x.statename === state).map(x => x.district)).forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; districtEl.appendChild(o); }); }
function onDistrictChange() { const state = document.getElementById('state').value; const district = document.getElementById('district').value; const pincodeEl = document.getElementById('pincode'); pincodeEl.innerHTML = '<option value="">Select Pincode</option>'; document.getElementById('officeName').innerHTML = '<option value="">Select Office Name</option>'; resetDealerSection(); uniq(locationMaster.filter(x => x.statename === state && x.district === district).map(x => String(x.pincode))).forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; pincodeEl.appendChild(o); }); }
function filterPincodeOptions() { const state = document.getElementById('state').value; const district = document.getElementById('district').value; const q = document.getElementById('pincodeSearch').value.trim(); const pincodeEl = document.getElementById('pincode'); pincodeEl.innerHTML = '<option value="">Select Pincode</option>'; uniq(locationMaster.filter(x => (!state || x.statename === state) && (!district || x.district === district) && (!q || String(x.pincode).includes(q))).map(x => String(x.pincode))).forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; pincodeEl.appendChild(o); }); }
function onPincodeChange() { const pin = document.getElementById('pincode').value; const officeEl = document.getElementById('officeName'); officeEl.innerHTML = '<option value="">Select Office Name</option>'; uniq(locationMaster.filter(x => String(x.pincode) === String(pin)).map(x => x.officename)).forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; officeEl.appendChild(o); }); loadDealersByPincode(pin); }
function loadDealersByPincode(pin) { const dealerSelect = document.getElementById('dealerSelect'); dealerSelect.innerHTML = '<option value="">Select Dealer</option>'; const matched = dealerMaster.filter(d => String(d.PIN).trim() === String(pin).trim()); matched.forEach((dealer, index) => { const option = document.createElement('option'); option.value = 'existing_' + index; option.textContent = `${dealer['Dealership Name'] || ''}`; option.dataset.dealer = JSON.stringify(dealer); dealerSelect.appendChild(option); }); const addNew = document.createElement('option'); addNew.value = 'new'; addNew.textContent = 'Add New Dealer'; dealerSelect.appendChild(addNew); clearDealerFields(); setExistingDealerMode(false); }
function onDealerSelect() { const dealerSelect = document.getElementById('dealerSelect'); const option = dealerSelect.options[dealerSelect.selectedIndex]; if (!option.value) { clearDealerFields(); setExistingDealerMode(false); return; } if (option.value === 'new') { clearDealerFields(); setExistingDealerMode(false); showMsg('Add New Dealer selected. All dealer fields are editable.'); return; } const dealer = JSON.parse(option.dataset.dealer || '{}'); document.getElementById('dealerName').value = dealer['Dealership Name'] || ''; document.getElementById('dealerAddress').value = dealer['Billing Address'] || ''; document.getElementById('ownerName').value = ''; document.getElementById('mobileNumber').value = ''; document.getElementById('dealerCategory').value = ''; setExistingDealerMode(true); showMsg('Existing dealer selected. Dealer Name and Dealer Address auto-filled.'); }
function clearDealerFields() { ['dealerName','ownerName','mobileNumber','dealerAddress'].forEach(id => document.getElementById(id).value = ''); document.getElementById('dealerCategory').value = ''; }
function setExistingDealerMode(isExisting) { document.getElementById('dealerName').readOnly = isExisting; document.getElementById('dealerAddress').readOnly = isExisting; document.getElementById('dealerName').classList.toggle('readonly', isExisting); document.getElementById('dealerAddress').classList.toggle('readonly', isExisting); document.getElementById('ownerName').readOnly = false; document.getElementById('mobileNumber').readOnly = false; document.getElementById('dealerCategory').disabled = false; }
function resetDealerSection() { document.getElementById('dealerSelect').innerHTML = '<option value="">Select Dealer</option>'; clearDealerFields(); setExistingDealerMode(false); }
function calcBrands() { let total = 0; brandIds.forEach(id => total += Number(document.getElementById(id).value || 0)); document.getElementById('brandTotal').value = total; const counter = Number(document.getElementById('totalCounterSize').value || 0); document.getElementById('othersCalculated').value = Math.max(counter - total, 0); }
function validateForm() { const required = ['state','district','pincode','officeName','dealerName','dealerAddress']; for (const id of required) { if (!String(document.getElementById(id).value || '').trim()) return false; } return true; }
async function submitFinal() {
  if (!validateForm()) { showMsg('Please fill required location and dealer details.', 'error'); return; }
  const submitBtn = document.getElementById('submitBtn'); submitBtn.disabled = true;
  const payload = { submittedAt: new Date().toISOString(), state: document.getElementById('state').value, district: document.getElementById('district').value, pincode: document.getElementById('pincode').value, officeName: document.getElementById('officeName').value, dealerSelectedFromMaster: document.getElementById('dealerSelect').value.startsWith('existing_'), isNewDealer: document.getElementById('dealerSelect').value === 'new', dealerName: document.getElementById('dealerName').value, ownerName: document.getElementById('ownerName').value, mobileNumber: document.getElementById('mobileNumber').value, dealerCategory: document.getElementById('dealerCategory').value, dealerAddress: document.getElementById('dealerAddress').value, totalCounterSize: document.getElementById('totalCounterSize').value, daikinAssociation: document.getElementById('daikinAssociation').value, brandContribution: Object.fromEntries(brandIds.map(id => [id, document.getElementById(id).value || '0'])), brandTotal: document.getElementById('brandTotal').value, othersCalculated: document.getElementById('othersCalculated').value };
  try {
    await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    showMsg('Mapping submitted successfully.');
  } catch (err) {
    showMsg('Submit request sent. If data is not saved, redeploy Apps Script and test again.', 'error');
  } finally { submitBtn.disabled = false; }
}
document.getElementById('state').addEventListener('change', onStateChange);
document.getElementById('district').addEventListener('change', onDistrictChange);
document.getElementById('pincodeSearch').addEventListener('input', filterPincodeOptions);
document.getElementById('pincode').addEventListener('change', onPincodeChange);
document.getElementById('dealerSelect').addEventListener('change', onDealerSelect);
brandIds.concat(['totalCounterSize']).forEach(id => document.getElementById(id).addEventListener('input', calcBrands));
loadMasters();
</script>
</body>
</html>
